<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- 背景の鮮やかなグラデーション -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <!-- チェックマークのクリーンなグラデーション -->
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <!-- スムースな影のエフェクト -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1E3A8A" flood-opacity="0.25"/>
    </filter>
    <filter id="elementShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- ベースの角丸スクエア -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- メインコンテンツ（ボードとリストの台紙） -->
  <g filter="url(#dropShadow)">
    <!-- タスク台紙 -->
    <rect x="112" y="96" width="288" height="320" rx="24" fill="#FFFFFF" />
    
    <!-- ヘッダーのアクセントライン -->
    <rect x="152" y="144" width="120" height="20" rx="10" fill="#E2E8F0" />
    
    <!-- タスク行 1 -->
    <rect x="216" y="210" width="144" height="16" rx="8" fill="#94A3B8" />
    <!-- タスク行 2 -->
    <rect x="216" y="274" width="112" height="16" rx="8" fill="#CBD5E1" />
    <!-- タスク行 3 -->
    <rect x="216" y="338" width="136" height="16" rx="8" fill="#CBD5E1" />

    <!-- 未完了のチェックボックス（円） -->
    <circle cx="168" cy="282" r="16" fill="none" stroke="#CBD5E1" stroke-width="4" />
    <circle cx="168" cy="346" r="16" fill="none" stroke="#CBD5E1" stroke-width="4" />
  </g>

  <!-- 完了のチェックマーク（強調要素として少し前に飛び出すエフェクト） -->
  <g filter="url(#elementShadow)">
    <!-- チェック完了の緑の円 -->
    <circle cx="168" cy="218" r="22" fill="url(#checkGrad)" />
    <!-- 内側のチェック文字 -->
    <path d="M154 218 L164 228 L182 208" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- 右下の時計アイコン（期限・タイムマネジメントのメタファー） -->
  <g filter="url(#elementShadow)">
    <circle cx="368" cy="352" r="56" fill="#FFFFFF" />
    <circle cx="368" cy="352" r="46" fill="none" stroke="#EF4444" stroke-width="8" />
    <!-- 時計の針（12時と3時方向を指す） -->
    <path d="M368 322 L368 352 L392 352" fill="none" stroke="#1E293B" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
